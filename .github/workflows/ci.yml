name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint (client)
        run: npm run lint --workspace=client

      - name: Type check (client)
        run: npm run type-check --workspace=client

      - name: Test (client)
        run: npm run test:ci --workspace=client

      - name: Lint (server)
        run: npm run lint --workspace=server || echo "No server lint script"

      - name: Type check (server)
        run: npm run build --workspace=server

      - name: Test (server)
        run: npm run test:ci --workspace=server || echo "No server tests"

      - name: Build client
        run: npm run build --workspace=client

      - name: Build server
        run: npm run build --workspace=server
