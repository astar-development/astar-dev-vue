name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: astar-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Build Vue client
        run: npm run build --workspace=client

      - name: Build Express server
        run: npm run build --workspace=server

      - name: Prepare deployment package
        run: |
          mkdir deploy

          # Copy server build output
          cp -r server/dist deploy/dist
          cp server/package.json deploy/

          # Copy client build output into a static folder the server can serve
          mkdir -p deploy/client/dist
          cp -r client/dist/. deploy/client/dist/

          # Print structure for debugging
          echo "Deployment package structure:"
          find deploy -maxdepth 4 -type f | sort

      - name: Install production dependencies
        run: npm install --omit=dev
        working-directory: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy/
